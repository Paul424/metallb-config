{{- if .Values.defaultAddressPool.enabled }}
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ include "metallb-config.fullname" . }}-default-pool
  labels:
    {{- include "metallb-config.labels" . | nindent 4 }}
spec:
  addresses:
    {{- with .Values.defaultAddressPool.addresses }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- if .Values.defaultL2Advertisement.enabled }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ include "metallb-config.fullname" . }}-default-l2
  labels:
    {{- include "metallb-config.labels" . | nindent 4 }}
spec:
  ipAddressPools:
    - {{ include "metallb-config.fullname" . }}-default-pool
{{- end }}
